version: '3.9'

x-db-environment: &x-db-environment
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

x-redis-environment: &x-redis-environment
  REDIS_PASSWORD: ${REDIS_PASSWORD}

x-app-environment: &x-app-environment
  PROJECT_NAME: ${PROJECT_NAME}
  FRONTEND_HOST: ${FRONTEND_HOST}
  ENVIRONMENT: ${ENVIRONMENT}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
  SECRET_KEY: ${SECRET_KEY}
  LOGGER_LEVEL: ${LOGGER_LEVEL}
  # Postgres
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  # Redis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: ${REDIS_DB}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  # GitHub OAuth
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
  # Observability
  SLOW_QUERY_THRESHOLD_MS: ${SLOW_QUERY_THRESHOLD_MS}
  METRICS_ENABLED: ${METRICS_ENABLED}
  # OpenTelemetry
  OTEL_ENABLED: ${OTEL_ENABLED}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
  OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE}

services:
  fastapi-app:
    build:
      context: .
    container_name: fastapi-app
    ports:
      - '80:80'
    environment:
      <<: *x-app-environment
      PYTHONUNBUFFERED: 1
    networks:
      - fastapi-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:8.4-alpine
    container_name: redis
    ports:
      - '6379:6379'
    environment:
      <<: *x-redis-environment
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--requirepass',
        '${REDIS_PASSWORD}',
      ]
    networks:
      - fastapi-network

  db:
    image: postgres:18-alpine
    container_name: postgres-db
    environment:
      <<: *x-db-environment
    ports:
      - '5432:5432'
    healthcheck:
      test:
        ['CMD', 'pg_isready', '-U', '${POSTGRES_USER}', '-d', '${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - fastapi-network

  taskiq-worker:
    build:
      context: .
    container_name: taskiq-worker
    command: ['/app/.venv/bin/taskiq', 'worker', 'app.workers.provider:broker']
    environment:
      <<: *x-app-environment
      PYTHONUNBUFFERED: 1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fastapi-network

  taskiq-scheduler:
    build:
      context: .
    container_name: taskiq-scheduler
    command:
      [
        '/app/.venv/bin/taskiq',
        'scheduler',
        'app.workers.scheduler:scheduler',
        '--fs-discover',
        '--tasks-pattern',
        'app/**/tasks.py',
      ]
    environment:
      <<: *x-app-environment
      PYTHONUNBUFFERED: 1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fastapi-network

networks:
  fastapi-network:

volumes:
  redis_data:
  db_data:
